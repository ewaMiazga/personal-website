<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Context-dependent unlearning diagram</title>
  <desc id="desc">A compact neural network diagram showing a highlighted context path being removed from a language model.</desc>
  <rect width="900" height="520" fill="#eef4f2"/>
  <g fill="none" stroke="#7f9994" stroke-width="5" opacity="0.7">
    <path d="M150 130 C330 80 500 190 710 120"/>
    <path d="M150 260 C330 210 500 320 710 250"/>
    <path d="M150 390 C330 340 500 450 710 380"/>
    <path d="M265 130 L370 260 L265 390"/>
    <path d="M500 120 L610 250 L500 380"/>
  </g>
  <g fill="#245f73">
    <circle cx="150" cy="130" r="28"/>
    <circle cx="150" cy="260" r="28"/>
    <circle cx="150" cy="390" r="28"/>
    <circle cx="370" cy="260" r="32"/>
    <circle cx="610" cy="250" r="34"/>
    <circle cx="710" cy="120" r="28"/>
    <circle cx="710" cy="250" r="28"/>
    <circle cx="710" cy="380" r="28"/>
  </g>
  <path d="M96 262 H760" stroke="#d05b4f" stroke-width="13" stroke-linecap="round" stroke-dasharray="22 24"/>
  <rect x="560" y="308" width="190" height="86" rx="18" fill="#ffffff" stroke="#d8d8cf" stroke-width="4"/>
  <text x="595" y="346" fill="#202124" font-family="Arial, sans-serif" font-size="24" font-weight="700">unlearn</text>
  <text x="595" y="374" fill="#667076" font-family="Arial, sans-serif" font-size="18">context path</text>
</svg>
